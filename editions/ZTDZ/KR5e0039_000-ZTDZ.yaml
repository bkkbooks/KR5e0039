front:
  text: 上清太玄鑑誡論伯九
  hash: sha256:bccfc83cce57aab663f12a69ff9bba8edc0f9e56a65bf2bdcc63a92de7a5ee0b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0039_SJB_000-240935c, image: sjb/24/240935c.png}
body:
  text: 姑射山神居洞太玄子撰頌曰直言至訣貞何必懼人情指引清凉路提携業火坑不圖君子重孰怕小兒輕語默依天理忠心話普平夫大道寂寂無形寥寥無象元和混太始之先玄微禀天地之外自然虚無生從有象象感杳㝠之中法至空寂之理真氣變真真精變神神真合道道者一也一生二二生三三生萬物萬物之中最靈最貴貴在修真真者常也爲人日用而不知知者至在人之心也心者兊中之神是也神中有真真本圓明性從清淨隨情錯亂背反正真不念你生從何來死歸何去且過去事休思未來事莫想你不明取現前一着管交你脫脫灑灑露露堂堂地做箇分明底漢天地不收鬼神不管身若太空性同無侣在陽而不焦託隂而不腐水火不能害山海無由阻通天透地穿金貫石孤然自在獨體逍遥變箇日月光明便是圓滿法身如此者知其實也未免遷途終身有悮全其聖功可以超生出死何以故如銅鐵鑄像須用範模若以修仙須憑師匠指訣玄機分明主客動靜清濁昇降浮沉三要内外有無此法者混而歸一至在清淨修鍊莫不向有爲中作得此法妙機由然有礙玄微妙法不可亂說畧而言之臨危一着認取規中大小細微辨正無差至死終身無礙若依此法後付天機太上曰見小曰明又曰死而不亡謂之壽平叔曰毫髮差殊不結丹又曰共神仙子細論你却莫道妄言惑衆隨人生死悮人性命若有如此之心天地不祐左眼滴膿右眼滴血剉身萬段永墮酆都世不受生有一等鈍根淺智心生不信競起人我暗地裏說是說非知他那裏偷得一兩句迷言謎語皂黑角裏轉轉地惑人自己不行勸人清淨常作畜生行當喫草見識酒色財氣不除慳貪嫉妬不斷每日家中偎妻抱子游言野語豈能成其正覺若不真履實踐豈不誤了前程頌曰嫉妬轉生嗔邪淫性不仁朝朝貪利路日日戀紅塵猪狗常爲伴狐狸日夜親色心猶未斷何幸論天真道衆欲要修仙須憑慷慨一刀兩段割愛離親除情去慾損念忘機冰清玉潔一志無疑參師訪道志誠堅修太上曰雖有榮觀燕處超然超然者遠避不居也又經曰但凡修道避靜深山幽玄石洞絶於雞犬斷却是非一心内覓無勞外求是謂諸念不生萬縁不染方可做箇出家兒便是箇無礙底閑人道衆自古至今也無一箇偎妻成道抱子登仙余令勸你却然忿怒常當發火却言列子在家成道時不曉事漢列子是大聖人也在家爲隱士你莫待也做箇隱士去也頌曰說者飛龍前行之跛鼈後修仙果未成作業功先就貪淫似野禽好色過山獸當作畜生心勿思天地祐當本之日燒香發願求師訪道也人言人語說得來覓縫不着元來口頭不似心頭便教我與他說開妙道鑿破天機我也唤則是箇人養底漢却元來是箇衆生如今稍悟得些小法度便早滑頭捏怪把他人便着詩詞嘲撥心生狡行意作不仁多能己勝自立門風道衆世中有這般賢士怎不教人冷笑更每日間瞞天昧地背義負心恩返生怨自誇頓悟道我心開駡師呵祖並無罪過休道無罪過你且試觸着這管交你大人廳下看打你那驢孔也無不道人之性命皆因大道所運暗察人之善惡經云天網恢恢踈而不失你見今世好醜富貴貧賤所因前世修種到來你早道了達天機却道諸事無礙有日天罰教你耳聾眼瞎癱瘇似恁地如何轉變怎生體用全無功行便早要做神仙却怕你不肯違天負地暗地不仁貪色好財破戒犯願似恁地作業造罪有日天開眼折罰你那死屍管下稍懊無盡期我爲你授了這業積累𤮴子滿後教你那畫眉蟲養箇人身獸面底怪物却教人擘口笑時着慚麽㦬更不敢論道說修行怕你不信時久後交人識看着頌曰學道無剛烈空將巧論舌常存意馬顛每使心猿劣暗地色情魔人前誇淨潔虧心業報深有日天公折道衆此等衆生求真有殺師害父之心背道有淫親污戚之意何以故求真問道得法返生冤報恩不掛懷怨常在念豈不是殺師害父之邪既然學道貪愛不斷色心不除常作猪狗見識牛驢行當豈不是淫親污戚之意佛言一切男兒是我父一切女人是我母似恁這般作爲更望做好人每日家由更翫弄我你待惱我我更不愀何爲不愀愚輩似糞土之爲若無糞土草木不生若無愚輩賢人不發被一等衆生厮惱厮害說是說非更早自誇伶利是則你也伶利會得些小法也能馳騁偷得一兩句言語便使滅門斷頭可知道恩生於害頌曰布惠恩生害慈悲返作冤朝朝迷酒色日日戀腥膻又取他人火不除自己煙勸君休狡佞照鑑有青天更有得法一等纔時得法未能解悟却早到付囑我如此天機不可亂傳與人及至背我他早别立門風毁謗先賢可知道教成一箇不如掐殺一箇似這般没前程行當豈不是打地獄底朴子未能修行學道早先作業造罪更兼賣道爲生積法求食茶來茶言酒來酒語兩兩三三一攢一簇更說是說非道人長短却不自斟酌那死人身軀到哩哩呿去攧地動不動變了猴猻臉道罷了却没一事似恁麽不乾重更由自要作神仙難得你八風吹不動待不語來和我一場憋悶似恁麽顛之倒怪狂心不除色心不斷真似没趐翎底蜜蜂兒一甜來兩甜去被他糊倒脚手整理不得平地上喫一交没奈何推道命不中没轉利漢豈不聞古人言云萬事不干天與地自家求死不求生及至勸着言道神仙皆是宿縁自己無福却不道人人有分箇箇圓明經云常無欲以觀其妙常有欲以觀其徼有欲無欲皆是人之心也是謂同出而異名異者各異也何以故常以無欲靜心明開天眼認取靈虚妙覺神室光明孤然獨體物外飄飄化箇瑩目天仙便是人人有分箇箇圓明道衆我與你做箇修仙的公案勿生不信子細推尋今生不了莫望來生來則也來裏知他誰家槽頭尾厮溷去邪不道一失人身萬劫不復怕你不信時没人處託手心頭子細思量去頌曰口辯說其功常居酒色叢未能通聖教自已立門風性染紅塵裏身居火院中臨危一念錯永劫墮沉空道衆然有幾箇修行離親割愛底每日家由一似浪驢不着灘蹟巡庵厮哄鬥觜合舌七顛八倒放軋九百爭人爭我地及至問着不言不語詐作好人又全不說一事空贏得箇名字大爭眼底雙撞天地也不見更早說本來面目不道你本來面目是箇甚的物是瞎畜生你眼前放箇出路處不肯尋覓却捏怪惑人身則出家心常在念向有人處做身做分及至没人處暗地裏却打長岀氣似恁麽不剛志無决斷一似打泥母猪拖泥帶水不濟不溜唵唵啗啗豈不虚受了十方施主供養不道你下稍着甚填還他你則有一法拽犂駞䭾便是你來生因果及至駡着却道一子出家諸天送供道衆似這般心學道一似畫底似不識羞耻由自更賣弄却道修行也無言無說是那箇邪畜生說與你來没轉利漢你當年之日出家時勾幹箇甚麽事來却不道你性命如何也便早信人之言既道無言無說時這大藏經盡是誑人邪教太上曰吾得真道非爲自然學而得之吕公曰不因師指此事難知既道無言無授上古聖人亦是謾語又說我清淨無爲便是修行樂然曰清淨無爲兩車糞土你既道不是糞土時你渾身上下盡是一堆臭穢蛆食古頌云上邊竅有眵泪中間竅有涕唾下間竅有屎尿精津血肉觔骨皮毛屎尿豈不是穢物蛆食却不道修行要真清真淨真清者太玄高渺寂湛無形真淨者明通法眼棄假還真認取本來一點神珠换釋凡胎棄除濁骨體若虚空性同日月名爲清淨一切穢物並不能污染若論無爲你守那箇無爲每日一似秕穀堆今澄身打坐怒觜臉腮把積古千年閑事盡都思量起來心上鬧嘈嘈地更由自說無爲你及至十二時中般柴運水着衣喫飯行居坐卧百端動用怎得無爲又被大小二便蹙你着又却早往糞堆頭走却不道這無爲要認取孤然靈覺物外天真明如赫日光似秋蟾射乾坤皎然無物照天地瑩淨無塵若達此教方可是箇清靜無爲不知聖人正義却學乖慵懶惰一似分界堠子牽不向前推不向後没轉利漢不知好弱不辯邪真我想筭上天也無這般不伶利底神仙頌曰真寳又何曾虚脾鬥葛藤自知巢𩿪鷃豈見海鯨鵬行短誇機巧功虧衒已能不因多謟詐惡業萬重增更有一等不近道理底庵舍中一似獨活草也無箇來往見每日家閉門塞户見箇送道糧人來脚手輕便荒忙迎接一似猴猻挐得更由敢對上真無禮告十方聦明伶利底君子待後來見這般不曉事漢後脚踏翻地着裂鼻木紐起驢脣灌些稀屎然後着尿衝與此輩衆生不通正理觸污上真頌曰蒼生謾一群逐浪入泥津挫弱玄元主葷非太上尊不明真正教自昩入邪門死受無間苦剛鋒萬劎身道衆不是我不慈悲爲你不仁和我忿外爲你畜生見識和我待作衆生行當余今直勸免你後憂苦口是良藥逆耳作忠言何以故善言不美美言不善直善者獲天堂之福至惡者遭地獄之殃罪業分明至在人爲學道抹捷一刀兩段斬丁截鐵迴心省悟做箇逍遥自在閑人去念生死事大直饒兒女成群金銀滿庫到頭終是一場落空這性命之珍財帛也買不得這生死兒女也替不得如人上坡各自努力至誠謹愼勿生不信之心積功累行訣正除邪鍊神合道道契神真至玄至妙至清至微盡其功焉是謂修行學仙之要也頌曰極目見兒孫金銀滿庫中一朝生死到兩事緫歸空聞早尋真路搜開慧目通神光輝日燦飛上太靈宫又頌曰盡在玄元祖都歸太上宗頭頭皆受命物物緫相通包廓乾元象含容大始中欲窮知古蒂認取五明宫上清太玄鑑誡論
